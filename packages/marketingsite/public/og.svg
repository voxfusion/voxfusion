<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">VoxFusion</title>
	<desc id="desc">Local-first voice to text for Mac.</desc>
	<defs>
		<pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
			<path d="M48 0H0v48" fill="none" stroke="#242424" stroke-width="2"/>
		</pattern>
		<linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#ff3e00"/>
			<stop offset="1" stop-color="#ff8a00"/>
		</linearGradient>
	</defs>
	<rect width="1200" height="630" fill="#0a0a0a"/>
	<rect width="1200" height="630" fill="url(#grid)" opacity="0.75"/>
	<rect x="72" y="72" width="1056" height="486" fill="none" stroke="#2f2f2f" stroke-width="2"/>
	<text x="104" y="128" fill="#ff3e00" font-family="JetBrains Mono, Space Mono, monospace" font-size="28" font-weight="700">[VOXFUSION]</text>
	<text x="104" y="276" fill="#f2f2f2" font-family="JetBrains Mono, Space Mono, monospace" font-size="78" font-weight="800">Local voice</text>
	<text x="104" y="366" fill="#f2f2f2" font-family="JetBrains Mono, Space Mono, monospace" font-size="78" font-weight="800">to text for Mac</text>
	<text x="108" y="444" fill="#a0a0a0" font-family="JetBrains Mono, Space Mono, monospace" font-size="30">Press a hotkey. Speak. Text appears.</text>
	<g transform="translate(780 176)" fill="none" stroke-linecap="square">
		<path d="M0 142h48m24 0h48m24 0h48m24 0h48" stroke="#3a3a3a" stroke-width="8"/>
		<path d="M24 96v92M96 42v200M168 78v128M240 18v248" stroke="url(#accent)" stroke-width="20"/>
		<rect x="-36" y="-36" width="356" height="356" stroke="#2f2f2f" stroke-width="2"/>
	</g>
</svg>
