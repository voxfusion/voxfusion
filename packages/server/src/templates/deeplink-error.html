<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>VoxFusion — Auth Error</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<style>
		@keyframes blink {
			0%, 50% { opacity: 1; }
			51%, 100% { opacity: 0; }
		}

		@keyframes pulse {
			0%, 100% { opacity: 0.4; }
			50% { opacity: 1; }
		}

		@keyframes fade-in {
			from { opacity: 0; transform: translateY(6px); }
			to { opacity: 1; transform: translateY(0); }
		}

		@keyframes scanline-move {
			0% { top: -4px; }
			100% { top: 100%; }
		}

		@keyframes glitch {
			0%, 100% { transform: translateX(0); opacity: 0; }
			10% { transform: translateX(var(--offset)); opacity: 0.4; }
			20% { transform: translateX(calc(var(--offset) * -0.5)); opacity: 0.2; }
			30% { transform: translateX(0); opacity: 0; }
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html {
			font-family: "JetBrains Mono", monospace;
			background: #0a0a0a;
			color: #e0e0e0;
			font-size: 14px;
		}

		body {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			position: relative;
			overflow: hidden;
		}

		.grid-overlay {
			position: fixed;
			inset: 0;
			background-image:
				linear-gradient(rgba(255, 62, 0, 0.03) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255, 62, 0, 0.03) 1px, transparent 1px);
			background-size: 40px 40px;
			pointer-events: none;
			z-index: 0;
		}

		.scanline {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 0;
			overflow: hidden;
		}

		.scanline::after {
			content: '';
			position: absolute;
			left: 0;
			right: 0;
			height: 4px;
			background: linear-gradient(180deg, transparent, rgba(255, 62, 0, 0.04), transparent);
			animation: scanline-move 4s linear infinite;
		}

		.nav {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			z-index: 100;
			border-bottom: 1px solid #222;
			background: rgba(10, 10, 10, 0.95);
			backdrop-filter: blur(10px);
		}

		.nav-inner {
			max-width: 1400px;
			margin: 0 auto;
			padding: 16px 32px;
			display: flex;
			align-items: center;
		}

		.logo {
			font-size: 16px;
			font-weight: 700;
			letter-spacing: 0.1em;
			text-decoration: none;
			color: inherit;
		}

		.logo-bracket { color: #ff3e00; }
		.logo-accent { color: #666; }

		.main {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 100px 24px 60px;
			position: relative;
			z-index: 1;
		}

		.container {
			max-width: 480px;
			width: 100%;
			position: relative;
			animation: fade-in 0.4s ease-out;
		}

		.terminal {
			border: 1px solid #333;
			background: #111;
			overflow: hidden;
		}

		.terminal-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 12px 16px;
			background: #0a0a0a;
			border-bottom: 1px solid #333;
		}

		.terminal-path {
			font-size: 12px;
			color: #666;
		}

		.terminal-path-accent { color: #ff3e00; }

		.terminal-controls {
			display: flex;
			gap: 6px;
		}

		.terminal-controls span {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			background: #333;
		}

		.terminal-body {
			padding: 20px;
			font-size: 13px;
			line-height: 2.2;
		}

		.terminal-line {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.prompt { color: #ff3e00; }
		.command { color: #fff; }
		.output { color: #666; }
		.status-tag { color: #ff3e00; }
		.status-err { color: #ff3e00; animation: pulse 2s ease-in-out infinite; }

		.cursor {
			animation: blink 1s infinite;
			color: #ff3e00;
		}

		.timestamp {
			font-size: 11px;
			color: #444;
		}

		.content {
			border: 1px solid #333;
			border-top: 0;
			background: #0a0a0a;
			padding: 32px 24px;
			text-align: center;
		}

		.error-code {
			font-size: clamp(48px, 10vw, 72px);
			font-weight: 800;
			line-height: 1;
			color: transparent;
			-webkit-text-stroke: 2px #ff3e00;
			letter-spacing: -0.04em;
			margin-bottom: 20px;
		}

		.error-title {
			font-size: 11px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.2em;
			color: #888;
			margin-bottom: 12px;
		}

		.error-description {
			font-size: 13px;
			color: #555;
			line-height: 1.7;
			max-width: 360px;
			margin: 0 auto 28px;
		}

		.btn {
			display: block;
			width: 100%;
			padding: 14px 24px;
			font-family: "JetBrains Mono", monospace;
			font-size: 13px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			text-decoration: none;
			text-align: center;
			cursor: pointer;
			border: 1px solid #ff3e00;
			background: transparent;
			color: #ff3e00;
			transition: all 0.15s ease;
		}

		.btn:hover {
			background: #ff3e00;
			color: #0a0a0a;
		}

		.footer {
			border: 1px solid #333;
			border-top: 0;
			background: #0a0a0a;
			padding: 10px 16px;
			text-align: center;
		}

		.footer-text {
			font-size: 11px;
			text-transform: uppercase;
			letter-spacing: 0.15em;
			color: #444;
		}

		.footer-cursor {
			animation: blink 1s infinite;
			color: #ff3e00;
		}

		/* Glitch lines */
		.glitch-lines {
			position: absolute;
			inset: 0;
			pointer-events: none;
			overflow: hidden;
		}

		.glitch-line {
			position: absolute;
			top: 50%;
			left: -10%;
			right: -10%;
			height: 2px;
			background: linear-gradient(90deg, transparent, #ff3e00, transparent);
			opacity: 0;
			animation: glitch 5s ease-in-out infinite;
			animation-delay: var(--delay);
		}

		.page-footer {
			border-top: 1px solid #222;
			padding: 20px 32px;
			position: relative;
			z-index: 1;
		}

		.page-footer-inner {
			max-width: 1400px;
			margin: 0 auto;
			display: flex;
			justify-content: space-between;
			font-size: 11px;
			color: #444;
		}

		.page-footer-status {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.page-footer-dot {
			width: 6px;
			height: 6px;
			background: #ff3e00;
			border-radius: 50%;
			animation: pulse 2s ease-in-out infinite;
		}

		@media (max-width: 600px) {
			.main { padding: 80px 16px 40px; }
			.nav-inner { padding: 14px 20px; }
			.terminal-body { padding: 16px; font-size: 12px; }
			.content { padding: 24px 20px; }
			.page-footer-inner { flex-direction: column; gap: 8px; align-items: center; }
		}
	</style>
</head>
<body>
	<div class="grid-overlay"></div>
	<div class="scanline"></div>

	<nav class="nav">
		<div class="nav-inner">
			<a href="/" class="logo">
				<span class="logo-bracket">[</span>VOX<span class="logo-accent">FUSION</span><span class="logo-bracket">]</span>
			</a>
		</div>
	</nav>

	<main class="main">
		<div class="container">
			<div class="terminal">
				<div class="terminal-header">
					<span class="terminal-path"><span class="terminal-path-accent">~</span> auth/deeplink</span>
					<div class="terminal-controls">
						<span></span><span></span><span></span>
					</div>
				</div>
				<div class="terminal-body">
					<div class="terminal-line">
						<span class="prompt">$</span>
						<span class="command">auth --verify-session</span>
					</div>
					<div class="terminal-line output">
						<span class="status-tag">[ERROR]</span>&nbsp;
						<span class="status-err">NO_SESSION_FOUND</span>
					</div>
					<div class="terminal-line output timestamp">
						<span>[<script>document.write(new Date().toISOString().slice(0,19).replace('T',' '))</script>]</span>
					</div>
					<div class="terminal-line">
						<span class="prompt">$</span>
						<span class="cursor">_</span>
					</div>
				</div>
			</div>

			<div class="content">
				<div class="error-code">401</div>
				<h1 class="error-title">Session not found</h1>
				<p class="error-description">
					Your session has expired or is invalid. Please try logging in again from the desktop app.
				</p>
				<a href="/" class="btn">
					&larr; Return to VoxFusion
				</a>
			</div>

			<div class="footer">
				<span class="footer-text">Auth failed<span class="footer-cursor">_</span></span>
			</div>

			<div class="glitch-lines">
				<div class="glitch-line" style="--delay: 0s; --offset: 12px"></div>
				<div class="glitch-line" style="--delay: 0.3s; --offset: -8px"></div>
				<div class="glitch-line" style="--delay: 0.6s; --offset: 15px"></div>
			</div>
		</div>
	</main>

	<footer class="page-footer">
		<div class="page-footer-inner">
			<span>&copy; 2025 VoxFusion</span>
			<span class="page-footer-status"><span class="page-footer-dot"></span> Auth error</span>
		</div>
	</footer>
</body>
</html>
