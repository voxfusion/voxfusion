<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>VoxFusion — Redirecting</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
	<style>
		@keyframes blink {
			0%, 50% { opacity: 1; }
			51%, 100% { opacity: 0; }
		}

		@keyframes spin {
			from { transform: rotate(0deg); }
			to { transform: rotate(360deg); }
		}

		@keyframes fade-in {
			from { opacity: 0; transform: translateY(6px); }
			to { opacity: 1; transform: translateY(0); }
		}

		@keyframes scanline-move {
			0% { top: -4px; }
			100% { top: 100%; }
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html {
			font-family: "JetBrains Mono", monospace;
			background: #0a0a0a;
			color: #e0e0e0;
			font-size: 14px;
		}

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
			overflow: hidden;
		}

		/* Grid overlay */
		.grid-overlay {
			position: fixed;
			inset: 0;
			background-image:
				linear-gradient(rgba(255, 62, 0, 0.03) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255, 62, 0, 0.03) 1px, transparent 1px);
			background-size: 40px 40px;
			pointer-events: none;
			z-index: 0;
		}

		/* Scanline */
		.scanline {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 0;
			overflow: hidden;
		}

		.scanline::after {
			content: '';
			position: absolute;
			left: 0;
			right: 0;
			height: 4px;
			background: linear-gradient(180deg, transparent, rgba(255, 62, 0, 0.04), transparent);
			animation: scanline-move 4s linear infinite;
		}

		/* Container */
		.container {
			position: relative;
			z-index: 1;
			max-width: 420px;
			width: 100%;
			padding: 0 24px;
			animation: fade-in 0.3s ease-out;
		}

		/* Terminal block */
		.terminal {
			border: 1px solid #333;
			background: #111;
			overflow: hidden;
		}

		.terminal-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 12px 16px;
			background: #0a0a0a;
			border-bottom: 1px solid #333;
		}

		.terminal-path {
			font-size: 12px;
			color: #666;
		}

		.terminal-path-accent { color: #ff3e00; }

		.terminal-controls {
			display: flex;
			gap: 6px;
		}

		.terminal-controls span {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			background: #333;
		}

		.terminal-body {
			padding: 20px;
			font-size: 13px;
			line-height: 2.2;
		}

		.terminal-line {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.prompt { color: #ff3e00; }
		.command { color: #fff; }
		.output { color: #666; }
		.status-tag { color: #ff3e00; }
		.status-ok { color: #00ff88; }

		.cursor {
			animation: blink 1s infinite;
			color: #ff3e00;
		}

		/* Content */
		.content {
			border: 1px solid #333;
			border-top: 0;
			background: #0a0a0a;
			padding: 28px 24px;
			text-align: center;
		}

		.redirect-row {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 12px;
			margin-bottom: 20px;
		}

		.spinner {
			width: 14px;
			height: 14px;
			border: 2px solid #333;
			border-top-color: #ff3e00;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
			flex-shrink: 0;
		}

		.redirect-text {
			font-size: 13px;
			color: #888;
			text-transform: uppercase;
			letter-spacing: 0.08em;
		}

		.btn {
			display: block;
			width: 100%;
			padding: 14px 24px;
			font-family: "JetBrains Mono", monospace;
			font-size: 13px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			text-decoration: none;
			text-align: center;
			cursor: pointer;
			border: 1px solid #ff3e00;
			background: transparent;
			color: #ff3e00;
			transition: all 0.15s ease;
		}

		.btn:hover {
			background: #ff3e00;
			color: #0a0a0a;
		}

		.hint {
			margin-top: 16px;
			font-size: 11px;
			color: #444;
		}

		/* Footer bar */
		.footer {
			border: 1px solid #333;
			border-top: 0;
			background: #0a0a0a;
			padding: 10px 16px;
			text-align: center;
		}

		.footer-text {
			font-size: 11px;
			text-transform: uppercase;
			letter-spacing: 0.15em;
			color: #444;
		}

		.footer-cursor {
			animation: blink 1s infinite;
			color: #ff3e00;
		}

		@media (max-width: 600px) {
			.terminal-body { padding: 16px; font-size: 12px; }
			.content { padding: 24px 20px; }
		}
	</style>
	<script>window.location.href = "{{DEEP_LINK}}";</script>
</head>
<body>
	<div class="grid-overlay"></div>
	<div class="scanline"></div>

	<div class="container">
		<div class="terminal">
			<div class="terminal-header">
				<span class="terminal-path"><span class="terminal-path-accent">~</span> auth/deeplink</span>
				<div class="terminal-controls">
					<span></span><span></span><span></span>
				</div>
			</div>
			<div class="terminal-body">
				<div class="terminal-line">
					<span class="prompt">$</span>
					<span class="command">auth --verify-session</span>
				</div>
				<div class="terminal-line output">
					<span class="status-tag">[OK]</span>&nbsp;
					<span class="status-ok">SESSION_VALID</span>
				</div>
				<div class="terminal-line">
					<span class="prompt">$</span>
					<span class="cursor">_</span>
				</div>
			</div>
		</div>

		<div class="content">
			<div class="redirect-row">
				<div class="spinner"></div>
				<span class="redirect-text">Opening VoxFusion</span>
			</div>

			<a href="{{DEEP_LINK}}" class="btn">
				&gt; Open manually
			</a>

			<p class="hint">If the app didn't open, click the button above</p>
		</div>

		<div class="footer">
			<span class="footer-text">Redirecting<span class="footer-cursor">_</span></span>
		</div>
	</div>
</body>
</html>
