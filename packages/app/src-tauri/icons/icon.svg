<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0E1B2E"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B4A"/>
      <stop offset="50%" style="stop-color:#E55A3A"/>
      <stop offset="100%" style="stop-color:#14919B"/>
    </linearGradient>
    <linearGradient id="waveGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C69"/>
      <stop offset="100%" style="stop-color:#1DB9C3"/>
    </linearGradient>
    <linearGradient id="waveGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DB9C3"/>
      <stop offset="100%" style="stop-color:#14919B"/>
    </linearGradient>
  </defs>

  <!-- Squircle background frame -->
  <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="url(#bgGradient)"/>
  
  <!-- Voice wave bars forming V shape - Left side -->
  <!-- Outer left wave -->
  <rect x="25" y="45" width="8" height="35" rx="4" fill="url(#waveGradient3)" opacity="0.7">
    <animate attributeName="height" values="35;45;35" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="45;40;45" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Second left wave -->
  <rect x="42" y="55" width="8" height="50" rx="4" fill="url(#waveGradient2)" opacity="0.8">
    <animate attributeName="height" values="50;60;50" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="55;50;55" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Third left wave -->
  <rect x="59" y="70" width="8" height="55" rx="4" fill="url(#waveGradient)" opacity="0.9">
    <animate attributeName="height" values="55;70;55" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="70;62;70" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Fourth left wave -->
  <rect x="76" y="85" width="8" height="60" rx="4" fill="url(#waveGradient)">
    <animate attributeName="height" values="60;75;60" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="85;77;85" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Center bottom wave (tip of V) -->
  <rect x="96" y="110" width="8" height="55" rx="4" fill="url(#waveGradient)">
    <animate attributeName="height" values="55;70;55" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="110;102;110" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Fourth right wave -->
  <rect x="116" y="85" width="8" height="60" rx="4" fill="url(#waveGradient)">
    <animate attributeName="height" values="60;75;60" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="85;77;85" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Third right wave -->
  <rect x="133" y="70" width="8" height="55" rx="4" fill="url(#waveGradient)" opacity="0.9">
    <animate attributeName="height" values="55;70;55" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="70;62;70" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Second right wave -->
  <rect x="150" y="55" width="8" height="50" rx="4" fill="url(#waveGradient2)" opacity="0.8">
    <animate attributeName="height" values="50;60;50" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="55;50;55" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Outer right wave -->
  <rect x="167" y="45" width="8" height="35" rx="4" fill="url(#waveGradient3)" opacity="0.7">
    <animate attributeName="height" values="35;45;35" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="45;40;45" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
