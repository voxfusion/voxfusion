name: Bug report
description: Report a reproducible problem in VoxFusion.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Open VoxFusion
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs, screenshots, or recordings if they help. Remove personal transcript or audio content.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: VoxFusion version
      placeholder: "0.1.0"
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Other
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: Operating system version
      placeholder: "macOS 15.4"
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal transcript, audio, dictionary, file path, and device details that are not needed for this report.
          required: true
