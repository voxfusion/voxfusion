name: Build and Push Server Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'packages/server/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy-server.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'packages/server/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/server

jobs:
  build-and-push:
    runs-on: tenki-standard-medium-4c-8g
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install Turbo Repo
        run: bun add -g turbo@^2.7.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check if server needs to be built
        id: turbo-check
        continue-on-error: true
        run: |
          # Use Turbo's dry-run to check if the server build task would execute
          # Note: This works best with Turbo's remote cache configured
          # Without cache, Turbo will always indicate a build is needed
          DRY_RUN_OUTPUT=$(turbo run build --filter=@voxfusion/server --dry-run 2>&1)
          
          # Check if Turbo indicates tasks would run
          # If output shows tasks to execute (not all cached), we need to build
          if echo "$DRY_RUN_OUTPUT" | grep -qiE "(tasks to execute|@voxfusion/server#build)" && \
             ! echo "$DRY_RUN_OUTPUT" | grep -qiE "(0 tasks|all cached)"; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
            echo "✓ Changes detected for server package, proceeding with Docker build"
          else
            # If all tasks are cached or no tasks to run, skip build
            if echo "$DRY_RUN_OUTPUT" | grep -qiE "(0 tasks|all cached|would be cached)"; then
              echo "build_needed=false" >> $GITHUB_OUTPUT
              echo "✓ No changes detected (cached), skipping Docker build"
            else
              # Default to building if check is inconclusive
              echo "build_needed=true" >> $GITHUB_OUTPUT
              echo "⚠ Proceeding with Docker build (Turbo check inconclusive)"
            fi
          fi

      - name: Set up Docker Buildx
        if: steps.turbo-check.outputs.build_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.turbo-check.outputs.build_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: steps.turbo-check.outputs.build_needed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: steps.turbo-check.outputs.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Skip build message
        if: steps.turbo-check.outputs.build_needed == 'false'
        run: echo "Skipping Docker build - no changes detected for server package"