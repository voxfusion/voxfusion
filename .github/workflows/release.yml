name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  actions: write

env:
  RELEASES_REPO: gregor-tokarev/voxfusion-releases

jobs:
  build:
    runs-on: tenki-macos-latest-mini
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'
          shared-key: 'release-build'
          save-if: ${{ github.ref_type == 'tag' }}

      - name: Install dependencies
        run: bun install

      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          cd packages/app/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          echo "Updated tauri.conf.json:"
          grep '"version"' tauri.conf.json

      - name: Setup Apple code signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Debug: Show runner info
          echo "macOS version:"
          sw_vers
          echo ""
          echo "Current keychains:"
          security list-keychains
          echo ""
          
          # Delete existing build.keychain if it exists (for non-ephemeral runners)
          security delete-keychain build.keychain 2>/dev/null || true
          
          # Decode certificate
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          
          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # Add to keychain search list (important for some runners)
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          
          # Import certificate with explicit codesign access
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          
          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          
          # Verify
          echo ""
          echo "Keychain search list after setup:"
          security list-keychains
          echo ""
          echo "Identities in build.keychain:"
          security find-identity -v -p codesigning build.keychain
          echo ""
          echo "All available signing identities:"
          security find-identity -v -p codesigning
          
          # Clean up certificate file
          rm certificate.p12

      - name: Get signing identity
        id: signing
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_OUTPUT
          echo "Found signing identity: $CERT_ID"

      - name: Build Tauri app
        working-directory: packages/app
        env:
          VITE_API_URL: https://voxfusion-production.up.railway.app
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ steps.signing.outputs.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run tauri build --target universal-apple-darwin

      - name: Find build artifacts
        id: artifacts
        run: |
          echo "Searching for artifacts..."

          DMG_PATH=$(find packages/app/src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: No DMG file found"
            find packages/app/src-tauri/target -type f -name "*.dmg" || true
            exit 1
          fi
          echo "Found DMG: $DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_OUTPUT

          # Find the .app.tar.gz file (this is what Tauri updater uses, not the .dmg)
          TARBALL_PATH=$(find packages/app/src-tauri/target -name "*.app.tar.gz" -type f | head -1)
          if [ -z "$TARBALL_PATH" ]; then
            echo "Error: No .app.tar.gz file found"
            find packages/app/src-tauri/target -type f -name "*.tar.gz" || true
            exit 1
          fi
          echo "Found tarball: $TARBALL_PATH"
          echo "TARBALL_PATH=$TARBALL_PATH" >> $GITHUB_OUTPUT

          # Find the signature file for the tarball
          SIG_FILE="${TARBALL_PATH}.sig"
          if [ -f "$SIG_FILE" ]; then
            echo "Found signature file: $SIG_FILE"
            cat "$SIG_FILE"
          else
            echo "Error: No signature file found at $SIG_FILE"
            echo "Looking for any .sig files:"
            find packages/app/src-tauri/target -name "*.sig" -type f || true
            exit 1
          fi
          echo "SIG_FILE=$SIG_FILE" >> $GITHUB_OUTPUT

      - name: Prepare artifacts for upload
        run: |
          mkdir -p release-artifacts
          cp "${{ steps.artifacts.outputs.DMG_PATH }}" release-artifacts/VoxFusion.dmg
          cp "${{ steps.artifacts.outputs.DMG_PATH }}" release-artifacts/VoxFusion-latest.dmg
          cp "${{ steps.artifacts.outputs.TARBALL_PATH }}" release-artifacts/VoxFusion.app.tar.gz
          cp "${{ steps.artifacts.outputs.SIG_FILE }}" release-artifacts/VoxFusion.app.tar.gz.sig

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

  publish:
    runs-on: tenki-standard-autoscale
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Read the signature file content (contains multi-line minisign signature)
          SIGNATURE=$(cat release-artifacts/VoxFusion.app.tar.gz.sig)
          # The updater URL should point to the .app.tar.gz, not the .dmg
          DOWNLOAD_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ github.ref_name }}/VoxFusion.app.tar.gz"

          # Use jq to properly escape the signature for JSON
          jq -n \
            --arg version "$VERSION" \
            --arg signature "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              version: $version,
              notes: "See release notes on GitHub",
              pub_date: $pub_date,
              platforms: {
                "darwin-universal": { signature: $signature, url: $url },
                "darwin-x86_64": { signature: $signature, url: $url },
                "darwin-aarch64": { signature: $signature, url: $url }
              }
            }' > latest.json

          echo "Created latest.json:"
          cat latest.json

      - name: Create release in public repository
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
        with:
          repository: ${{ env.RELEASES_REPO }}
          tag_name: ${{ github.ref_name }}
          name: VoxFusion ${{ github.ref_name }}
          body: |
            ## VoxFusion ${{ github.ref_name }}

            ### Download
            Download the DMG file below and drag VoxFusion to your Applications folder.

            ### First Launch (Important)
            Since this app is not signed with an Apple Developer ID, macOS will show a warning.

            **To open the app:**
            1. Right-click (or Control-click) on VoxFusion in Applications
            2. Select "Open" from the context menu
            3. Click "Open" in the dialog that appears

            You only need to do this once. After that, the app will open normally.

            ---
            Existing users will receive this update automatically.
          draft: false
          prerelease: false
          files: |
            release-artifacts/VoxFusion.dmg
            release-artifacts/VoxFusion-latest.dmg
            release-artifacts/VoxFusion.app.tar.gz
            latest.json
