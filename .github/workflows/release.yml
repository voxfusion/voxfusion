name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  RELEASES_REPO: gregor-tokarev/voxfusion-releases

jobs:
  build:
    runs-on: tenki-macos-latest-mini
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'

      - name: Install dependencies
        run: bun install

      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          cd packages/app/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          echo "Updated tauri.conf.json:"
          grep '"version"' tauri.conf.json

      - name: Build Tauri app
        working-directory: packages/app
        env:
          VITE_API_URL: https://voxfusion-production.up.railway.app
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --target universal-apple-darwin

      - name: Find build artifacts
        id: artifacts
        run: |
          echo "Searching for artifacts..."

          DMG_PATH=$(find packages/app/src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: No DMG file found"
            find packages/app/src-tauri/target -type f -name "*.dmg" || true
            exit 1
          fi
          echo "Found DMG: $DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_OUTPUT

          SIG_FILE=$(find packages/app/src-tauri/target -name "*.tar.gz.sig" -type f | head -1)
          if [ -n "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
          else
            SIGNATURE=""
            echo "Warning: No signature file found"
          fi
          echo "SIGNATURE=$SIGNATURE" >> $GITHUB_OUTPUT

      - name: Prepare artifacts for upload
        run: |
          mkdir -p release-artifacts
          cp "${{ steps.artifacts.outputs.DMG_PATH }}" release-artifacts/VoxFusion.dmg
          cp "${{ steps.artifacts.outputs.DMG_PATH }}" release-artifacts/VoxFusion-latest.dmg

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

      - name: Save signature
        run: echo "${{ steps.artifacts.outputs.SIGNATURE }}" > release-artifacts/signature.txt

      - name: Upload signature
        uses: actions/upload-artifact@v4
        with:
          name: release-signature
          path: release-artifacts/signature.txt

  publish:
    runs-on: tenki-standard-autoscale
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

      - name: Download signature
        uses: actions/download-artifact@v4
        with:
          name: release-signature
          path: release-signature/

      - name: Read signature
        id: sig
        run: |
          SIGNATURE=$(cat release-signature/signature.txt)
          echo "SIGNATURE=$SIGNATURE" >> $GITHUB_OUTPUT

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SIGNATURE="${{ steps.sig.outputs.SIGNATURE }}"
          DOWNLOAD_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ github.ref_name }}/VoxFusion-latest.dmg"

          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "$SIGNATURE",
                "url": "$DOWNLOAD_URL"
              },
              "darwin-x86_64": {
                "signature": "$SIGNATURE",
                "url": "$DOWNLOAD_URL"
              },
              "darwin-aarch64": {
                "signature": "$SIGNATURE",
                "url": "$DOWNLOAD_URL"
              }
            }
          }
          EOF

          echo "Created latest.json:"
          cat latest.json

      - name: Create release in public repository
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
        with:
          repository: ${{ env.RELEASES_REPO }}
          tag_name: ${{ github.ref_name }}
          name: VoxFusion ${{ github.ref_name }}
          body: |
            ## VoxFusion ${{ github.ref_name }}

            ### Download
            Download the DMG file below and drag VoxFusion to your Applications folder.

            ### First Launch (Important)
            Since this app is not signed with an Apple Developer ID, macOS will show a warning.

            **To open the app:**
            1. Right-click (or Control-click) on VoxFusion in Applications
            2. Select "Open" from the context menu
            3. Click "Open" in the dialog that appears

            You only need to do this once. After that, the app will open normally.

            ---
            Existing users will receive this update automatically.
          draft: false
          prerelease: false
          files: |
            release-artifacts/VoxFusion.dmg
            release-artifacts/VoxFusion-latest.dmg
            latest.json
