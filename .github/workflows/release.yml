name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

env:
  LEGACY_RELEASES_REPO: gregor-tokarev/voxfusion-releases

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'
          shared-key: 'release-build'
          save-if: ${{ github.ref_type == 'tag' }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          cd packages/app/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          echo "Updated tauri.conf.json:"
          grep '"version"' tauri.conf.json

      # Build the crispasr engine that runs Parakeet models (handlers::parakeet)
      # for both architectures. Done before the certificate import so the large
      # compile does not eat into the keychain's unlock window.
      - name: Build Parakeet engine (crispasr)
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          PARAKEET_ARCH=arm64 PARAKEET_BUILD_DIR=/tmp/crispasr-arm64 \
            bash packages/app/scripts/build-parakeet-engine.sh "$GITHUB_WORKSPACE/engine-staging/aarch64-apple-darwin"
          PARAKEET_ARCH=x86_64 PARAKEET_BUILD_DIR=/tmp/crispasr-x86_64 \
            bash packages/app/scripts/build-parakeet-engine.sh "$GITHUB_WORKSPACE/engine-staging/x86_64-apple-darwin"

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Verify Certificate
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported: $CERT_ID"

      # The engine binaries are bundled into Contents/Resources/bin, which the
      # Tauri bundler does not sign for us. Notarization requires every Mach-O
      # to be signed with hardened runtime, so sign them before staging.
      - name: Sign Parakeet engine binaries
        run: |
          for f in engine-staging/*/*; do
            codesign --force --options runtime --timestamp --sign "$CERT_ID" "$f"
            codesign --verify --verbose=2 "$f"
          done

      - name: Verify Apple notarization secrets
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for secret_name in APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing GitHub secret: $secret_name"
              exit 1
            fi
          done

      - name: Build Tauri app
        working-directory: packages/app
        env:
          VITE_API_URL: https://voxfusion-production.up.railway.app
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          # Stage the matching engine build into src-tauri/engine, which
          # tauri.conf.json bundles into Contents/Resources/bin.
          stage_engine() {
            rm -rf src-tauri/engine
            mkdir -p src-tauri/engine
            cp "$GITHUB_WORKSPACE/engine-staging/$1/"* src-tauri/engine/
          }
          stage_engine aarch64-apple-darwin
          bun run tauri build --target aarch64-apple-darwin
          stage_engine x86_64-apple-darwin
          bun run tauri build --target x86_64-apple-darwin

      # The resources entry is a glob, so a missing engine would bundle nothing
      # rather than fail the build — assert it made it into both app bundles.
      - name: Verify bundled Parakeet engine
        run: |
          verify_engine() {
            local target="$1" arch="$2" app_path engine
            app_path=$(find "packages/app/src-tauri/target/$target/release/bundle/macos" -maxdepth 1 -name "*.app" -type d | head -1)
            engine="$app_path/Contents/Resources/bin/crispasr"
            if [ ! -f "$engine" ]; then
              echo "::error::crispasr engine missing from $app_path"
              exit 1
            fi
            lipo -archs "$engine" | grep -qw "$arch"
            codesign --verify --verbose=2 "$engine"
            echo "Bundled engine OK ($arch): $engine"
          }
          verify_engine aarch64-apple-darwin arm64
          verify_engine x86_64-apple-darwin x86_64

      - name: Find build artifacts
        id: artifacts
        run: |
          echo "Searching for artifacts..."

          ARM_DMG_PATH=$(find packages/app/src-tauri/target/aarch64-apple-darwin -name "*.dmg" -type f | head -1)
          if [ -z "$ARM_DMG_PATH" ]; then
            echo "Error: No Apple Silicon DMG file found"
            find packages/app/src-tauri/target/aarch64-apple-darwin -type f -name "*.dmg" || true
            exit 1
          fi
          echo "Found Apple Silicon DMG: $ARM_DMG_PATH"
          echo "ARM_DMG_PATH=$ARM_DMG_PATH" >> $GITHUB_OUTPUT

          INTEL_DMG_PATH=$(find packages/app/src-tauri/target/x86_64-apple-darwin -name "*.dmg" -type f | head -1)
          if [ -z "$INTEL_DMG_PATH" ]; then
            echo "Error: No Intel DMG file found"
            find packages/app/src-tauri/target/x86_64-apple-darwin -type f -name "*.dmg" || true
            exit 1
          fi
          echo "Found Intel DMG: $INTEL_DMG_PATH"
          echo "INTEL_DMG_PATH=$INTEL_DMG_PATH" >> $GITHUB_OUTPUT

          ARM_TARBALL_PATH=$(find packages/app/src-tauri/target/aarch64-apple-darwin -name "*.app.tar.gz" -type f | head -1)
          if [ -z "$ARM_TARBALL_PATH" ]; then
            echo "Error: No Apple Silicon .app.tar.gz file found"
            find packages/app/src-tauri/target/aarch64-apple-darwin -type f -name "*.tar.gz" || true
            exit 1
          fi
          echo "Found Apple Silicon tarball: $ARM_TARBALL_PATH"
          echo "ARM_TARBALL_PATH=$ARM_TARBALL_PATH" >> $GITHUB_OUTPUT

          INTEL_TARBALL_PATH=$(find packages/app/src-tauri/target/x86_64-apple-darwin -name "*.app.tar.gz" -type f | head -1)
          if [ -z "$INTEL_TARBALL_PATH" ]; then
            echo "Error: No Intel .app.tar.gz file found"
            find packages/app/src-tauri/target/x86_64-apple-darwin -type f -name "*.tar.gz" || true
            exit 1
          fi
          echo "Found Intel tarball: $INTEL_TARBALL_PATH"
          echo "INTEL_TARBALL_PATH=$INTEL_TARBALL_PATH" >> $GITHUB_OUTPUT

          ARM_SIG_FILE="${ARM_TARBALL_PATH}.sig"
          if [ -f "$ARM_SIG_FILE" ]; then
            echo "Found Apple Silicon signature file: $ARM_SIG_FILE"
            cat "$ARM_SIG_FILE"
          else
            echo "Error: No Apple Silicon signature file found at $ARM_SIG_FILE"
            find packages/app/src-tauri/target/aarch64-apple-darwin -name "*.sig" -type f || true
            exit 1
          fi
          echo "ARM_SIG_FILE=$ARM_SIG_FILE" >> $GITHUB_OUTPUT

          INTEL_SIG_FILE="${INTEL_TARBALL_PATH}.sig"
          if [ -f "$INTEL_SIG_FILE" ]; then
            echo "Found Intel signature file: $INTEL_SIG_FILE"
            cat "$INTEL_SIG_FILE"
          else
            echo "Error: No Intel signature file found at $INTEL_SIG_FILE"
            find packages/app/src-tauri/target/x86_64-apple-darwin -name "*.sig" -type f || true
            exit 1
          fi
          echo "INTEL_SIG_FILE=$INTEL_SIG_FILE" >> $GITHUB_OUTPUT

      - name: Notarize macOS DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          notarize_dmg() {
            local dmg_path="$1"

            echo "Submitting DMG for notarization: $dmg_path"
            xcrun notarytool submit "$dmg_path" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait

            echo "Stapling notarization ticket to DMG: $dmg_path"
            xcrun stapler staple "$dmg_path"
            xcrun stapler validate "$dmg_path"
          }

          notarize_dmg "${{ steps.artifacts.outputs.ARM_DMG_PATH }}"
          notarize_dmg "${{ steps.artifacts.outputs.INTEL_DMG_PATH }}"

      - name: Verify macOS signing and notarization
        run: |
          verify_dmg() {
            local dmg_path="$1"
            local assessment

            echo "Verifying DMG signature and Gatekeeper assessment: $dmg_path"
            if ! assessment=$(spctl -a -vvv -t open --context context:primary-signature "$dmg_path" 2>&1); then
              echo "$assessment"
              exit 1
            fi
            echo "$assessment"
            if echo "$assessment" | grep -q "Unnotarized Developer ID"; then
              echo "Error: DMG is signed but not notarized: $dmg_path"
              exit 1
            fi
          }

          verify_app_tarball() {
            local tarball_path="$1"
            local tmp_dir
            tmp_dir=$(mktemp -d)

            echo "Verifying app bundle in updater tarball: $tarball_path"
            tar -xzf "$tarball_path" -C "$tmp_dir"

            local app_path
            app_path=$(find "$tmp_dir" -maxdepth 2 -name "*.app" -type d | head -1)
            if [ -z "$app_path" ]; then
              echo "Error: No .app bundle found in $tarball_path"
              find "$tmp_dir" -maxdepth 3 -print
              exit 1
            fi

            codesign --verify --deep --strict --verbose=2 "$app_path"
            xcrun stapler validate "$app_path"
            spctl -a -vvv -t exec "$app_path"
          }

          verify_dmg "${{ steps.artifacts.outputs.ARM_DMG_PATH }}"
          verify_dmg "${{ steps.artifacts.outputs.INTEL_DMG_PATH }}"
          verify_app_tarball "${{ steps.artifacts.outputs.ARM_TARBALL_PATH }}"
          verify_app_tarball "${{ steps.artifacts.outputs.INTEL_TARBALL_PATH }}"

      - name: Prepare artifacts for upload
        run: |
          mkdir -p release-artifacts
          cp "${{ steps.artifacts.outputs.ARM_DMG_PATH }}" release-artifacts/VoxFusion.dmg
          cp "${{ steps.artifacts.outputs.ARM_DMG_PATH }}" release-artifacts/VoxFusion-latest.dmg
          cp "${{ steps.artifacts.outputs.ARM_TARBALL_PATH }}" release-artifacts/VoxFusion.app.tar.gz
          cp "${{ steps.artifacts.outputs.ARM_SIG_FILE }}" release-artifacts/VoxFusion.app.tar.gz.sig
          cp "${{ steps.artifacts.outputs.INTEL_DMG_PATH }}" release-artifacts/VoxFusion-intel.dmg
          cp "${{ steps.artifacts.outputs.INTEL_DMG_PATH }}" release-artifacts/VoxFusion-latest-intel.dmg
          cp "${{ steps.artifacts.outputs.INTEL_TARBALL_PATH }}" release-artifacts/VoxFusion-intel.app.tar.gz
          cp "${{ steps.artifacts.outputs.INTEL_SIG_FILE }}" release-artifacts/VoxFusion-intel.app.tar.gz.sig

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

  publish:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate updater manifests
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ARM_SIGNATURE=$(cat release-artifacts/VoxFusion.app.tar.gz.sig)
          INTEL_SIGNATURE=$(cat release-artifacts/VoxFusion-intel.app.tar.gz.sig)

          create_manifest() {
            local output="$1"
            local arm_download_url="$2"
            local intel_download_url="$3"

            jq -n \
              --arg version "$VERSION" \
              --arg arm_signature "$ARM_SIGNATURE" \
              --arg intel_signature "$INTEL_SIGNATURE" \
              --arg arm_url "$arm_download_url" \
              --arg intel_url "$intel_download_url" \
              --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                version: $version,
                notes: "See release notes on GitHub",
                pub_date: $pub_date,
                platforms: {
                  "darwin-aarch64": { signature: $arm_signature, url: $arm_url },
                  "darwin-x86_64": { signature: $intel_signature, url: $intel_url }
                }
              }' > "$output"
          }

          create_manifest \
            latest-current.json \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/VoxFusion.app.tar.gz" \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/VoxFusion-intel.app.tar.gz"
          create_manifest \
            latest-legacy.json \
            "https://github.com/${{ env.LEGACY_RELEASES_REPO }}/releases/download/${{ github.ref_name }}/VoxFusion.app.tar.gz" \
            "https://github.com/${{ env.LEGACY_RELEASES_REPO }}/releases/download/${{ github.ref_name }}/VoxFusion-intel.app.tar.gz"

          echo "Created current repository updater manifest:"
          cat latest-current.json
          echo "Created legacy releases repository updater manifest:"
          cat latest-legacy.json

      - name: Prepare current repository manifest
        run: cp latest-current.json latest.json

      - name: Create release in current repository
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VoxFusion ${{ github.ref_name }}
          body: |
            ## VoxFusion ${{ github.ref_name }}

            ### Download
            Download the DMG file below and drag VoxFusion to your Applications folder.

            This release is signed and notarized by Apple.

            ---
            Existing users will receive this update automatically.
          draft: false
          prerelease: false
          files: |
            release-artifacts/VoxFusion.dmg
            release-artifacts/VoxFusion-latest.dmg
            release-artifacts/VoxFusion-intel.dmg
            release-artifacts/VoxFusion-latest-intel.dmg
            release-artifacts/VoxFusion.app.tar.gz
            release-artifacts/VoxFusion-intel.app.tar.gz
            latest.json

      - name: Prepare legacy releases repository manifest
        run: cp latest-legacy.json latest.json

      - name: Create release in legacy releases repository
        id: legacy_release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASES_GITHUB_TOKEN }}
          repository: ${{ env.LEGACY_RELEASES_REPO }}
          tag_name: ${{ github.ref_name }}
          name: VoxFusion ${{ github.ref_name }}
          body: |
            ## VoxFusion ${{ github.ref_name }}

            ### Download
            Download the DMG file below and drag VoxFusion to your Applications folder.

            This release is signed and notarized by Apple.

            ---
            Existing users will receive this update automatically.
          draft: false
          prerelease: false
          files: |
            release-artifacts/VoxFusion.dmg
            release-artifacts/VoxFusion-latest.dmg
            release-artifacts/VoxFusion-intel.dmg
            release-artifacts/VoxFusion-latest-intel.dmg
            release-artifacts/VoxFusion.app.tar.gz
            release-artifacts/VoxFusion-intel.app.tar.gz
            latest.json

      - name: Warn if legacy releases repository publish failed
        if: steps.legacy_release.outcome == 'failure'
        run: |
          echo "::warning::Publishing to ${{ env.LEGACY_RELEASES_REPO }} failed. The primary release in ${{ github.repository }} was already created successfully. Check RELEASES_GITHUB_TOKEN if the legacy mirror is still required."
