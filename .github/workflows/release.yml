name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  actions: write

env:
  RELEASES_REPO: gregor-tokarev/voxfusion-releases

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'
          shared-key: 'release-build-macos'
          save-if: ${{ github.ref_type == 'tag' }}

      - name: Install dependencies
        run: bun install

      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          cd packages/app/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          echo "Updated tauri.conf.json:"
          grep '"version"' tauri.conf.json

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Verify Certificate
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported: $CERT_ID"

      - name: Build Tauri app
        working-directory: packages/app
        env:
          VITE_API_URL: https://voxfusion-production.up.railway.app
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
        run: bun run tauri build --target universal-apple-darwin

      - name: Find build artifacts
        id: artifacts
        run: |
          echo "Searching for artifacts..."

          DMG_PATH=$(find packages/app/src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: No DMG file found"
            find packages/app/src-tauri/target -type f -name "*.dmg" || true
            exit 1
          fi
          echo "Found DMG: $DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_OUTPUT

          TARBALL_PATH=$(find packages/app/src-tauri/target -name "*.app.tar.gz" -type f | head -1)
          if [ -z "$TARBALL_PATH" ]; then
            echo "Error: No .app.tar.gz file found"
            find packages/app/src-tauri/target -type f -name "*.tar.gz" || true
            exit 1
          fi
          echo "Found tarball: $TARBALL_PATH"
          echo "TARBALL_PATH=$TARBALL_PATH" >> $GITHUB_OUTPUT

          SIG_FILE="${TARBALL_PATH}.sig"
          if [ -f "$SIG_FILE" ]; then
            echo "Found signature file: $SIG_FILE"
            cat "$SIG_FILE"
          else
            echo "Error: No signature file found at $SIG_FILE"
            find packages/app/src-tauri/target -name "*.sig" -type f || true
            exit 1
          fi
          echo "SIG_FILE=$SIG_FILE" >> $GITHUB_OUTPUT

      - name: Prepare artifacts for upload
        run: |
          mkdir -p release-artifacts
          cp "${{ steps.artifacts.outputs.DMG_PATH }}" release-artifacts/VoxFusion.dmg
          cp "${{ steps.artifacts.outputs.DMG_PATH }}" release-artifacts/VoxFusion-latest.dmg
          cp "${{ steps.artifacts.outputs.TARBALL_PATH }}" release-artifacts/VoxFusion.app.tar.gz
          cp "${{ steps.artifacts.outputs.SIG_FILE }}" release-artifacts/VoxFusion.app.tar.gz.sig

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-macos
          path: release-artifacts/

  build-windows:
    runs-on: tenki-standard-small-2c-4g
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis llvm clang lld libwebkit2gtk-4.1-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'
          shared-key: 'release-build-windows'
          save-if: ${{ github.ref_type == 'tag' }}

      - name: Install dependencies
        run: bun install

      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          cd packages/app/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          echo "Updated tauri.conf.json:"
          grep '"version"' tauri.conf.json

      - name: Build Tauri app
        working-directory: packages/app
        env:
          VITE_API_URL: https://voxfusion-production.up.railway.app
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: lld-link
        run: bun run tauri build --target x86_64-pc-windows-msvc

      - name: Find build artifacts
        id: artifacts
        run: |
          echo "Searching for artifacts..."

          NSIS_PATH=$(find packages/app/src-tauri/target -name "*.exe" -path "*/nsis/*" -type f | head -1)
          if [ -z "$NSIS_PATH" ]; then
            echo "Error: No NSIS installer found"
            find packages/app/src-tauri/target -type f -name "*.exe" || true
            exit 1
          fi
          echo "Found NSIS installer: $NSIS_PATH"
          echo "NSIS_PATH=$NSIS_PATH" >> $GITHUB_OUTPUT

          NSIS_SIG="${NSIS_PATH}.sig"
          if [ -f "$NSIS_SIG" ]; then
            echo "Found NSIS signature: $NSIS_SIG"
            cat "$NSIS_SIG"
          else
            echo "Error: No NSIS signature file found at $NSIS_SIG"
            find packages/app/src-tauri/target -name "*.sig" -type f || true
            exit 1
          fi
          echo "NSIS_SIG=$NSIS_SIG" >> $GITHUB_OUTPUT

      - name: Prepare artifacts for upload
        run: |
          mkdir -p release-artifacts
          cp "${{ steps.artifacts.outputs.NSIS_PATH }}" release-artifacts/VoxFusion-setup.exe
          cp "${{ steps.artifacts.outputs.NSIS_SIG }}" release-artifacts/VoxFusion-setup.exe.sig

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-windows
          path: release-artifacts/

  publish:
    runs-on: tenki-standard-small-2c-4g
    needs: [build-macos, build-windows]
    steps:
      - name: Download macOS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-macos
          path: release-artifacts/

      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-windows
          path: release-artifacts/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          MAC_SIGNATURE=$(cat release-artifacts/VoxFusion.app.tar.gz.sig)
          MAC_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ github.ref_name }}/VoxFusion.app.tar.gz"
          WIN_SIGNATURE=$(cat release-artifacts/VoxFusion-setup.exe.sig)
          WIN_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ github.ref_name }}/VoxFusion-setup.exe"

          jq -n \
            --arg version "$VERSION" \
            --arg mac_signature "$MAC_SIGNATURE" \
            --arg mac_url "$MAC_URL" \
            --arg win_signature "$WIN_SIGNATURE" \
            --arg win_url "$WIN_URL" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              version: $version,
              notes: "See release notes on GitHub",
              pub_date: $pub_date,
              platforms: {
                "darwin-universal": { signature: $mac_signature, url: $mac_url },
                "darwin-x86_64": { signature: $mac_signature, url: $mac_url },
                "darwin-aarch64": { signature: $mac_signature, url: $mac_url },
                "windows-x86_64": { signature: $win_signature, url: $win_url }
              }
            }' > latest.json

          echo "Created latest.json:"
          cat latest.json

      - name: Create release in public repository
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
        with:
          repository: ${{ env.RELEASES_REPO }}
          tag_name: ${{ github.ref_name }}
          name: VoxFusion ${{ github.ref_name }}
          body: |
            ## VoxFusion ${{ github.ref_name }}

            ### Download
            - **macOS**: Download the DMG file and drag VoxFusion to your Applications folder.
            - **Windows**: Download the setup .exe installer and run it.

            ---
            Existing users will receive this update automatically.
          draft: false
          prerelease: false
          files: |
            release-artifacts/VoxFusion.dmg
            release-artifacts/VoxFusion-latest.dmg
            release-artifacts/VoxFusion.app.tar.gz
            release-artifacts/VoxFusion-setup.exe
            latest.json
