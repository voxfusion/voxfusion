name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  RELEASES_REPO: gregor-tokarev/voxfusion-releases

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'

      - name: Install dependencies
        run: bun install

      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          cd packages/app/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          echo "Updated tauri.conf.json:"
          grep '"version"' tauri.conf.json

      - name: Build Tauri app
        working-directory: packages/app
        env:
          VITE_API_URL: https://voxfusion-production.up.railway.app
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --target universal-apple-darwin

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Find build artifacts
        id: artifacts
        run: |
          echo "Searching for artifacts..."

          DMG_PATH=$(find packages/app/src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: No DMG file found"
            find packages/app/src-tauri/target -type f -name "*.dmg" || true
            exit 1
          fi
          echo "Found DMG: $DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_OUTPUT

          # Generate latest.json for updater
          BUNDLE_DIR=$(dirname "$DMG_PATH")
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}

          # Find the .tar.gz.sig file for signature
          SIG_FILE=$(find packages/app/src-tauri/target -name "*.tar.gz.sig" -type f | head -1)
          if [ -n "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
          else
            SIGNATURE=""
            echo "Warning: No signature file found"
          fi

          # Create latest.json
          UPDATER_JSON="packages/app/src-tauri/target/latest.json"
          cat > "$UPDATER_JSON" << EOF
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "$SIGNATURE",
                "url": "PLACEHOLDER"
              },
              "darwin-x86_64": {
                "signature": "$SIGNATURE",
                "url": "PLACEHOLDER"
              },
              "darwin-aarch64": {
                "signature": "$SIGNATURE",
                "url": "PLACEHOLDER"
              }
            }
          }
          EOF

          echo "Created latest.json"
          echo "UPDATER_JSON=$UPDATER_JSON" >> $GITHUB_OUTPUT

      - name: Update latest.json with GitHub release URLs
        run: |
          # Update the download URL in latest.json to point to the public releases repo
          DOWNLOAD_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ github.ref_name }}/VoxFusion-latest.dmg"

          echo "Updating latest.json at: ${{ steps.artifacts.outputs.UPDATER_JSON }}"
          echo "New download URL: $DOWNLOAD_URL"

          jq --arg url "$DOWNLOAD_URL" \
             '.platforms."darwin-universal".url = $url | .platforms."darwin-x86_64".url = $url | .platforms."darwin-aarch64".url = $url' \
             "${{ steps.artifacts.outputs.UPDATER_JSON }}" > latest.json.tmp
          mv latest.json.tmp "${{ steps.artifacts.outputs.UPDATER_JSON }}"

          echo "Updated latest.json:"
          cat "${{ steps.artifacts.outputs.UPDATER_JSON }}"

      - name: Copy DMG as VoxFusion-latest.dmg
        run: |
          cp "${{ steps.artifacts.outputs.DMG_PATH }}" "VoxFusion-latest.dmg"

      - name: Create release in public repository
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
        with:
          repository: ${{ env.RELEASES_REPO }}
          tag_name: ${{ github.ref_name }}
          name: VoxFusion ${{ github.ref_name }}
          body: |
            ## VoxFusion ${{ github.ref_name }}

            ### Download
            Download the DMG file below and drag VoxFusion to your Applications folder.

            ### First Launch (Important)
            Since this app is not signed with an Apple Developer ID, macOS will show a warning.

            **To open the app:**
            1. Right-click (or Control-click) on VoxFusion in Applications
            2. Select "Open" from the context menu
            3. Click "Open" in the dialog that appears

            You only need to do this once. After that, the app will open normally.

            ---
            Existing users will receive this update automatically.
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.DMG_PATH }}
            VoxFusion-latest.dmg
            ${{ steps.artifacts.outputs.UPDATER_JSON }}
